name: GPU Unittest Check

on:
    # Nightly: re-validate master against the freshly built nightly paddle
    # Cron is UTC: '0 21 * * *' => 05:00 UTC+8
    # schedule:
    #     - cron: '0 21 * * *'
    pull_request:
        branches: [master, develop, "release/**"]
        paths-ignore:
            - '**/*.md'
            - 'docs/**'
            - 'LICENSE'
            - '.gitignore'
            - '.pre-commit-config.yaml'
    push:
        branches: [master, develop]
        paths-ignore:
            - '**/*.md'
            - 'docs/**'
            - 'LICENSE'
            - '.gitignore'
            - '.pre-commit-config.yaml'

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    gpu-unittest:
        name: GPU Unittest Check
        runs-on:
            group: PaConvert
            labels: [gpu]
        timeout-minutes: 120

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Ensure CI image Exists
              run: |
                docker image inspect paconvert-ci:cu118 >/dev/null 2>&1 || \
                    docker build --pull -t paconvert-ci:cu118 -f tools/docker/Dockerfile tools/docker

            - name: Start Container
              run: |
                container_name="paconvert-gpu-unittest-${{ github.run_id }}-${{ github.run_attempt }}"
                echo "container_name=${container_name}" >> "$GITHUB_ENV"
                docker run -d --name "${container_name}" \
                    -e http_proxy=$http_proxy \
                    -e https_proxy=$https_proxy \
                    -e no_proxy="localhost,127.0.0.1" \
                    --gpus all \
                    --network host \
                    -v /dev/shm:/dev/shm \
                    -v "${{ github.workspace }}:/ws" \
                    -w /ws \
                    paconvert-ci:cu118 sleep infinity

            - name: Run GPU Unittest
              run: |
                docker exec "$container_name" bash scripts/ci/run_gpu_unittest.sh

            - name: Cleanup Container
              if: always()
              run: |
                if [ -n "${container_name:-}" ]; then
                    docker exec "${container_name}" chown -R "$(id -u):$(id -g)" /ws 2>/dev/null || true
                    docker rm -f "${container_name}" || true
                fi


name: Consistency Check

on:
    # Nightly: re-validate master against the freshly built nightly paddle
    # Cron is UTC: '0 21 * * *' => 05:00 UTC+8
    # schedule:
    #     - cron: '0 21 * * *'
    pull_request:
        branches: [master, develop, "release/**"]
        paths-ignore:
            - '**/*.md'
            - 'docs/**'
            - 'LICENSE'
            - '.gitignore'
            - '.pre-commit-config.yaml'

    push:
        branches: [master, develop]
        paths-ignore:
            - '**/*.md'
            - 'docs/**'
            - 'LICENSE'
            - '.gitignore'
            - '.pre-commit-config.yaml'

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    common-api-consistency:
        name: Common API Consistency Check
        # TODO: replace with the actual self-hosted CPU runner group name
        runs-on: ubuntu-24.04
        timeout-minutes: 20

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                fetch-depth: 1

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.10'
                cache: pip
                cache-dependency-path: |
                  requirements.txt
                  tests/requirements.txt

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                python -m pip install -r requirements.txt
                if [ -f tests/requirements.txt ]; then
                    python -m pip install -r tests/requirements.txt
                fi

            - name: Run common API consistency check
              run: |
                set -o pipefail
                python tools/consistency/consistency_check.py 2>&1 | tee consistency_check.log

            - name : Upload log on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                name: consistency-log-${{ github.run_id }}
                path: |
                  consistency_check.log
                  tools/consistency/*.log
                  tools/consistency/*.txt
                if-no-files-found: ignore
                retention-days: 14

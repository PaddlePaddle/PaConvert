name: Rerun Workflows

on:
    issue_comment:
        types: [created]

permissions:
    actions: write
    contents: read
    pull-requests: read

concurrency:
    group: rerun-${{ github.event.issue.number }}
    cancel-in-progress: true

jobs:
    re-run:
        name: rerun workflows
        if: ${{ github.event.issue.pull_request && contains(github.event.comment.body, '/re-run') && github.event.comment.user.login == github.event.issue.user.login }}
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Rerun all failed jobs
              if: ${{ contains(github.event.comment.body, 'all-failed') }}
              uses: ./.github/actions/rerun-workflow
              with:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                OWNER: ${{ github.repository_owner }}
                REPO: ${{ github.event.repository.name }}
                PR_ID: ${{ github.event.issue.number }}
                JOB_NAME: 'all-failed'

            - name: Rerun Codestyle
              if: ${{ contains(github.event.comment.body, 'codestyle') }}
              uses: ./.github/actions/rerun-workflow
              with:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                OWNER: ${{ github.repository_owner }}
                REPO: ${{ github.event.repository.name }}
                PR_ID: ${{ github.event.issue.number }}
                JOB_NAME: 'pre-commit'

            - name: Rerun Common API Consistency Check
              if: ${{ contains(github.event.comment.body, 'consistency') }}
              uses: ./.github/actions/rerun-workflow
              with:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                OWNER: ${{ github.repository_owner }}
                REPO: ${{ github.event.repository.name }}
                PR_ID: ${{ github.event.issue.number }}
                JOB_NAME: 'Common API Consistency Check'

            - name: Rerun Install Check
              if: ${{ contains(github.event.comment.body, 'install-check') }}
              uses: ./.github/actions/rerun-workflow
              with:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                OWNER: ${{ github.repository_owner }}
                REPO: ${{ github.event.repository.name }}
                PR_ID: ${{ github.event.issue.number }}
                JOB_NAME: 'Install Check'

            - name: Rerun Modeltest Check
              if: ${{ contains(github.event.comment.body, 'model-test') }}
              uses: ./.github/actions/rerun-workflow
              with:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                OWNER: ${{ github.repository_owner }}
                REPO: ${{ github.event.repository.name }}
                PR_ID: ${{ github.event.issue.number }}
                JOB_NAME: 'Modeltest Check'

            - name: Rerun Distributed Unittest Check
              if: ${{ contains(github.event.comment.body, 'distributed-unittest') }}
              uses: ./.github/actions/rerun-workflow
              with:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                OWNER: ${{ github.repository_owner }}
                REPO: ${{ github.event.repository.name }}
                PR_ID: ${{ github.event.issue.number }}
                JOB_NAME: 'Distributed Unittest Check'

            - name: Rerun CI Unittest
              if: ${{ contains(github.event.comment.body, 'cpu-unittest') }}
              uses: ./.github/actions/rerun-workflow
              with:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                OWNER: ${{ github.repository_owner }}
                REPO: ${{ github.event.repository.name }}
                PR_ID: ${{ github.event.issue.number }}
                JOB_NAME: 'CI Unittest'

            - name: Rerun GPU Unittest Check
              if: ${{ contains(github.event.comment.body, 'gpu-unittest') }}
              uses: ./.github/actions/rerun-workflow
              with:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                OWNER: ${{ github.repository_owner }}
                REPO: ${{ github.event.repository.name }}
                PR_ID: ${{ github.event.issue.number }}
                JOB_NAME: 'GPU Unittest Check'

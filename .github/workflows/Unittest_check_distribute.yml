name: Distributed Unittest Check

on:
    # Nightly: re-validate master against the freshly built nightly paddle
    # Cron is UTC: '0 21 * * *' => 05:00 UTC+8
    # schedule:
    #     - cron: '0 21 * * *'  
    pull_request:
        branches: [master, develop, "release/**"]
        paths-ignore:
            - '**/*.md'
            - 'docs/**'
            - 'LICENSE'
            - '.gitignore'
            - '.pre-commit-config.yaml'
    push:
        branches: [master, develop]
        paths-ignore:
            - '**/*.md'
            - 'docs/**'
            - 'LICENSE'
            - '.gitignore'
            - '.pre-commit-config.yaml'

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    distributed-unittest:
        name: Distributed Unittest Check
        runs-on:
            group: PaConvert
        timeout-minutes: 120

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.10'
                cache: pip
                cache-dependency-path: |
                  requirements.txt
                  tests/requirements.txt

            - name: Check Env
              run: |
                python --version
                pwd

            - name: Download GPU dependencies
              working-directory: tests/distributed
              run: |
                wget --no-proxy -q https://paddle-paconvert.bj.bcebos.com/torch-2.7.1+cu118-cp310-cp310-manylinux_2_28_x86_64.whl

            - name: Install Latest Release GPU Version Torch
              working-directory: tests/distributed
              run: |
                python -m pip install --upgrade pip
                python -m pip uninstall -y torchaudio
                python -m pip uninstall -y torchvision
                python -m pip install torch-2.7.1+cu118-cp310-cp310-manylinux_2_28_x86_64.whl
                python -c "import torch; print('torch version information:', torch.__version__)"

            - name: Install Latest develop GPU Version Paddle
              run: |
                python -m pip uninstall -y paddlepaddle
                python -m pip uninstall -y paddlepaddle-gpu
                python -m pip install --force-reinstall --no-deps --no-cache-dir -U --pre paddlepaddle-gpu \
                    -i https://www.paddlepaddle.org.cn/packages/nightly/cu118/ \
                    --timeout 120 --retries 3
                python -m pip install safetensors==0.6.2
                python -c "import paddle; print('paddle version information:', paddle.__version__); print('paddle commit information:', paddle.__git_commit__)"

            - name: Install paconvert requirements
              run: |
                python -m pip install -r requirements.txt

            - name: Convert torch code to paddle
              working-directory: tests/distributed
              run: |
                python ../../paconvert/main.py -i . -o /tmp/paddle_dist --log_level "DEBUG"

            - name: Run distributed unit tests
              working-directory: tests/distributed
              shell: bash
              env:
                CUDA_VISIBLE_DEVICES: "0,1"
              run: |
                # Free port 29500 if any leftover process is occupying it
                netstat -tulnp 2>/dev/null | grep ':29500' | awk '{print $7}' | cut -d/ -f1 | xargs -r kill -9 2>/dev/null || true

                # Disable errexit so every test runs and all failures are collected
                # Instead of aborting on the first failing test.
                set +e

                check_error=0
                failed_tests=()
                test_list=$(ls *.py | grep -v run_and_compare.py)
                for item in $test_list; do
                    cmd1="torchrun --nproc_per_node=2 ${item}"
                    cmd2="python -m paddle.distributed.launch /tmp/paddle_dist/${item}"
                    python run_and_compare.py "$cmd1" "$cmd2"
                    tmp_check_error=$?
                    if [ $tmp_check_error -ne 0 ]; then
                        check_error=1
                        failed_tests+=("$item")
                    fi
                done

                echo '************************************************************************************************************'
                if [ ${#failed_tests[@]} -ne 0 ]; then
                    printf '%s\n' "${failed_tests[@]}" > failed_tests.txt
                    echo "Your PR code distributed unittest check FAILED"
                    echo "The following distributed tests failed:"
                    cat failed_tests.txt
                    echo "Please run the following command:"
                    echo ""
                    echo "    cd tests/distributed && bash unittest_check_distribute.sh"
                    echo ""
                    echo "For more information, please refer to our check guide:"
                    echo "https://github.com/PaddlePaddle/PaConvert#readme"
                else
                    echo "Your PR code distributed unit test check passed."
                fi
                echo '************************************************************************************************************'

                exit ${check_error}

            - name: Upload logs on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                name: distributed-unittest-log-${{ github.run_id }}
                path: |
                  tests/distributed/failed_tests.txt
                  tests/distributed/*.log
                  /tmp/paddle_dist/**
                if-no-files-found: ignore
                retention-days: 14
